# Optional: a local PostgreSQL for development, so your machine matches Render.
# Only needed if you want to keep developing locally now that the app targets
# Postgres (it previously used a local SQLite file).
#
#   Start it:   docker compose up -d
#   Stop it:    docker compose down          (data is kept in the named volume)
#   Wipe it:    docker compose down -v        (deletes the local data)
#
# Then set DATABASE_URL in your .env to:
#   postgresql://postgres:postgres@localhost:5432/aa_anniversary?schema=public
# and run:  npx prisma migrate deploy   (creates the tables)

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aa_anniversary
    ports:
      - "5432:5432"
    volumes:
      - aa_pgdata:/var/lib/postgresql/data

volumes:
  aa_pgdata:
